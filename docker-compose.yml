version: '3.8'

services:
  mysql:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-despacho_db}
      MYSQL_USER: ${MYSQL_USER:-despacho_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-despacho_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - despacho-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    container_name: backend_despachos
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-despacho_db}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-despacho_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-despacho_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_DDL_AUTO:-update}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - despacho-network

  frontend:
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
    container_name: front_despachos
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - despacho-network

volumes:
  mysql_data:

networks:
  despacho-network:
    driver: bridge
